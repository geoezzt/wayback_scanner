<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wayback Recon</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap');
:root{
  --bg:#060910;--surface:#0d1117;--card:#0f1923;--border:#1a2535;
  --accent:#00ff88;--blue:#38bdf8;--red:#ff4560;--orange:#ff8c00;
  --yellow:#ffd60a;--purple:#a371f7;--muted:#4a5568;--text:#e2e8f0;
  --mono:'JetBrains Mono',monospace;--ui:'Inter',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--ui);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;
  background-image:linear-gradient(rgba(0,255,136,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,136,.025) 1px,transparent 1px);
  background-size:44px 44px;pointer-events:none;z-index:0}

/* HERO */
.hero{position:relative;z-index:1;padding:44px 20px 28px;max-width:820px;margin:0 auto;text-align:center}
.eyebrow{display:inline-flex;align-items:center;gap:8px;background:rgba(0,255,136,.07);border:1px solid rgba(0,255,136,.18);border-radius:20px;padding:5px 14px;font-family:var(--mono);font-size:11px;color:var(--accent);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:18px}
.dot-live{width:6px;height:6px;background:var(--accent);border-radius:50%;animation:blink 1.4s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}
h1{font-size:clamp(24px,5vw,46px);font-weight:700;line-height:1.1;letter-spacing:-1px;margin-bottom:10px}
h1 em{font-style:normal;background:linear-gradient(135deg,var(--accent),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-sub{font-size:14px;color:var(--muted);margin:0 auto 28px;max-width:500px;line-height:1.7}

/* INPUT */
.panel{max-width:820px;margin:0 auto 18px;padding:0 18px;position:relative;z-index:1}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:22px}
.field-lbl{font-size:11px;font-family:var(--mono);color:var(--accent);letter-spacing:1.2px;text-transform:uppercase;margin-bottom:7px}
.input-row{display:flex;gap:10px;flex-wrap:wrap}
input[type=text]{flex:1;min-width:180px;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:11px 14px;color:var(--text);font-family:var(--mono);font-size:13px;outline:none;transition:border-color .2s}
input[type=text]:focus{border-color:var(--accent)}
input::placeholder{color:var(--muted)}
select{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:11px 14px;color:var(--text);font-family:var(--mono);font-size:12px;outline:none;cursor:pointer}
select:focus{border-color:var(--accent)}
select option{background:var(--surface)}
.btn-scan{background:linear-gradient(135deg,#00cc6a,#0055dd);border:none;border-radius:8px;padding:11px 26px;color:#fff;font-size:13px;font-weight:700;font-family:var(--ui);cursor:pointer;transition:all .2s;white-space:nowrap}
.btn-scan:hover{filter:brightness(1.1);transform:translateY(-1px)}
.btn-scan:disabled{opacity:.4;cursor:not-allowed;transform:none}

/* PROGRESS */
.prog-wrap{max-width:820px;margin:0 auto 16px;padding:0 18px;position:relative;z-index:1;display:none}
.prog-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px 20px}
.prog-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px}
.prog-label{font-family:var(--mono);font-size:12px;color:var(--accent)}
.prog-count{font-family:var(--mono);font-size:11px;color:var(--muted)}
.track{background:var(--border);border-radius:3px;height:3px;overflow:hidden}
.fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--blue));width:0;transition:width .4s;border-radius:3px}
.prog-status{margin-top:8px;font-family:var(--mono);font-size:11px;color:var(--muted);min-height:16px}

/* RESULTS */
.results{max-width:820px;margin:0 auto;padding:0 18px 52px;position:relative;z-index:1}

/* summary grid */
.summary-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px;margin-bottom:20px}
.sum-card{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:10px 14px;text-align:center;transition:border-color .15s;cursor:pointer}
.sum-card:hover{border-color:#2a3f55}
.sum-card.active{border-color:var(--accent)}
.sum-card .num{font-family:var(--mono);font-size:24px;font-weight:700;line-height:1.1}
.sum-card .lbl{font-size:10px;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:.4px}

/* section tabs */
.section-nav{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
.sec-btn{background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:6px;padding:5px 12px;font-size:11px;font-family:var(--mono);cursor:pointer;transition:all .15s;white-space:nowrap}
.sec-btn:hover{border-color:var(--accent);color:var(--accent)}
.sec-btn.active{background:rgba(0,255,136,.08);border-color:var(--accent);color:var(--accent)}
.sec-btn .cnt{opacity:.7;margin-left:4px}

/* export */
.export-row{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px}
.exp-btn{background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:6px;padding:5px 13px;font-size:11px;cursor:pointer;font-family:var(--ui);transition:all .15s}
.exp-btn:hover{border-color:var(--blue);color:var(--blue)}

/* search */
.search-bar{display:flex;gap:8px;margin-bottom:12px;align-items:center}
.search-bar input{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:8px 12px;color:var(--text);font-family:var(--mono);font-size:12px;outline:none;transition:border-color .2s}
.search-bar input:focus{border-color:var(--accent)}
.search-bar input::placeholder{color:var(--muted)}
.result-count{font-family:var(--mono);font-size:11px;color:var(--muted);white-space:nowrap}

/* url list */
.url-list{display:flex;flex-direction:column;gap:5px}
.url-row-item{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:9px 12px;display:flex;align-items:center;gap:8px;transition:border-color .15s}
.url-row-item:hover{border-color:#253040}
.status-badge{font-size:9px;font-family:var(--mono);font-weight:700;padding:2px 7px;border-radius:4px;flex-shrink:0;min-width:38px;text-align:center}
.s200{background:rgba(0,255,136,.12);color:var(--accent);border:1px solid rgba(0,255,136,.25)}
.s301,.s302,.s307,.s308{background:rgba(56,189,248,.12);color:var(--blue);border:1px solid rgba(56,189,248,.25)}
.s403{background:rgba(255,140,0,.12);color:var(--orange);border:1px solid rgba(255,140,0,.25)}
.s404{background:rgba(74,85,104,.1);color:var(--muted);border:1px solid rgba(74,85,104,.2)}
.s500,.s502,.s503,.s504{background:rgba(255,69,96,.12);color:var(--red);border:1px solid rgba(255,69,96,.25)}
.s-null{background:rgba(74,85,104,.07);color:var(--muted);border:1px solid rgba(74,85,104,.15)}

.tag-list{display:flex;gap:4px;flex-wrap:wrap;flex-shrink:0}
.tag{font-size:9px;font-family:var(--mono);padding:2px 6px;border-radius:3px;background:rgba(163,113,247,.1);color:var(--purple);border:1px solid rgba(163,113,247,.2)}
.tag-api{background:rgba(56,189,248,.1);color:var(--blue);border-color:rgba(56,189,248,.2)}
.tag-admin,.tag-sensitive{background:rgba(255,69,96,.1);color:var(--red);border-color:rgba(255,69,96,.2)}
.tag-auth{background:rgba(255,140,0,.1);color:var(--orange);border-color:rgba(255,140,0,.2)}
.tag-js,.tag-json{background:rgba(255,214,10,.1);color:var(--yellow);border-color:rgba(255,214,10,.2)}
.tag-params,.tag-interesting-params{background:rgba(0,255,136,.1);color:var(--accent);border-color:rgba(0,255,136,.2)}

.url-text{font-family:var(--mono);font-size:11px;word-break:break-all;flex:1;color:#94a3b8}
.url-text:hover{color:var(--text)}
.copy-url{background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:3px;padding:2px 7px;font-size:10px;font-family:var(--mono);cursor:pointer;flex-shrink:0;transition:all .15s}
.copy-url:hover{border-color:var(--accent);color:var(--accent)}

/* empty */
.empty{text-align:center;padding:48px 20px;color:var(--muted)}
.empty-icon{font-size:40px;opacity:.35;margin-bottom:12px}
.empty-title{font-size:14px;font-weight:600;color:#64748b}

@media(max-width:580px){
  .input-row{flex-direction:column}
  select,.btn-scan{width:100%}
  .summary-grid{grid-template-columns:repeat(3,1fr)}
}
</style>
</head>
<body>

<div class="hero">
  <div class="eyebrow"><span class="dot-live"></span> Web Archive Recon</div>
  <h1>Wayback <em>Recon</em></h1>
  <p class="hero-sub">أدخلي الـ domain — بيجيب كل الروابط من Web Archive ويصنفها: status codes، JS files، API endpoints، admin panels، sensitive files وأكتر.</p>
</div>

<div class="panel">
  <div class="card">
    <div class="field-lbl">// Target Domain</div>
    <div class="input-row">
      <input type="text" id="domain" placeholder="target.com" />
      <select id="limit">
        <option value="500">500 URLs</option>
        <option value="1000" selected>1000 URLs</option>
        <option value="2000">2000 URLs</option>
        <option value="5000">5000 URLs</option>
      </select>
      <button class="btn-scan" onclick="startScan()">⚡ Scan</button>
    </div>
  </div>
</div>

<div class="prog-wrap" id="prog-wrap">
  <div class="prog-card">
    <div class="prog-top">
      <div class="prog-label" id="prog-label">// Fetching from Web Archive...</div>
      <div class="prog-count" id="prog-count">—</div>
    </div>
    <div class="track"><div class="fill" id="fill"></div></div>
    <div class="prog-status" id="prog-status">Connecting to Wayback Machine...</div>
  </div>
</div>

<div class="results" id="results"></div>

<script>
let scanData = null;
let activeSection = 'alive';
let searchQ = '';

const SECTION_META = {
  // status buckets
  alive:        { label:'✅ Alive (200)',      color:'var(--accent)',  key:'bucket' },
  redirect:     { label:'↪ Redirects',         color:'var(--blue)',    key:'bucket' },
  forbidden:    { label:'🔒 Forbidden (403)',  color:'var(--orange)',  key:'bucket' },
  server_error: { label:'💥 Server Errors',    color:'var(--red)',     key:'bucket' },
  not_found:    { label:'404 Not Found',       color:'var(--muted)',   key:'bucket' },
  unchecked:    { label:'⬜ Unchecked',        color:'var(--muted)',   key:'bucket' },
  // special
  js:                 { label:'📜 JS Files',          color:'var(--yellow)',  key:'special' },
  json:               { label:'{ } JSON Files',       color:'var(--yellow)',  key:'special' },
  api_endpoints:      { label:'🔌 API Endpoints',     color:'var(--blue)',    key:'special' },
  with_params:        { label:'? With Params',        color:'var(--accent)',  key:'special' },
  interesting_params: { label:'🎯 Juicy Params',      color:'var(--accent)',  key:'special' },
  admin_panels:       { label:'🚨 Admin Panels',      color:'var(--red)',     key:'special' },
  auth_endpoints:     { label:'🔑 Auth Endpoints',    color:'var(--orange)',  key:'special' },
  file_uploads:       { label:'📤 Upload Endpoints',  color:'var(--orange)',  key:'special' },
  graphql:            { label:'⬡ GraphQL',            color:'var(--purple)',  key:'special' },
  swagger_docs:       { label:'📖 Swagger/Docs',      color:'var(--blue)',    key:'special' },
  sensitive_files:    { label:'⚠️ Sensitive Files',   color:'var(--red)',     key:'special' },
  debug_endpoints:    { label:'🐛 Debug/Test',        color:'var(--orange)',  key:'special' },
  webhooks:           { label:'🪝 Webhooks',          color:'var(--purple)',  key:'special' },
  backend_files:      { label:'⚙️ Backend Files',     color:'var(--orange)',  key:'special' },
};

const steps = [
  { pct:8,  msg:'Connecting to Wayback Machine CDX API...' },
  { pct:20, msg:'Fetching archived URLs from Web Archive...' },
  { pct:40, msg:'Fetching from Common Crawl index...' },
  { pct:58, msg:'Deduplicating and classifying URLs...' },
  { pct:72, msg:'Running status checks (HEAD requests)...' },
  { pct:88, msg:'Building categories and buckets...' },
  { pct:95, msg:'Almost done...' },
];

async function startScan() {
  const domain = document.getElementById('domain').value.trim().replace(/^https?:\/\//,'').replace(/\/.*/,'');
  if (!domain) { alert('أدخلي الـ domain'); return; }

  scanData = null; activeSection = 'alive'; searchQ = '';
  document.getElementById('results').innerHTML = '';
  document.getElementById('prog-wrap').style.display = 'block';
  document.querySelector('.btn-scan').disabled = true;

  const limit = parseInt(document.getElementById('limit').value);
  document.getElementById('prog-count').textContent = `limit: ${limit}`;

  // animate steps
  let stepIdx = 0;
  const stepTimer = setInterval(() => {
    if (stepIdx < steps.length) {
      const s = steps[stepIdx++];
      document.getElementById('fill').style.width = s.pct + '%';
      document.getElementById('prog-status').textContent = s.msg;
    }
  }, 2200);

  try {
    const r = await fetch('/api/wayback', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ domain, limit }),
    });
    clearInterval(stepTimer);
    if (!r.ok) { const e = await r.json(); throw new Error(e.error || 'Server error'); }
    scanData = await r.json();

    document.getElementById('fill').style.width = '100%';
    document.getElementById('prog-label').textContent = '// Scan complete';
    document.getElementById('prog-count').textContent = `${scanData.total_found} URLs found`;
    document.getElementById('prog-status').textContent =
      `✅ ${scanData.total_found} URLs fetched · ${scanData.total_checked} status-checked · ${scanData.domain}`;

    renderResults();
  } catch(e) {
    clearInterval(stepTimer);
    document.getElementById('prog-status').textContent = '⚠ Error: ' + e.message;
  }
  document.querySelector('.btn-scan').disabled = false;
}

function getList(section) {
  if (!scanData) return [];
  const meta = SECTION_META[section];
  if (!meta) return [];
  return meta.key === 'bucket'
    ? (scanData.buckets[section] || [])
    : (scanData.special[section] || []);
}

function renderResults() {
  if (!scanData) return;
  const b = scanData.buckets, sp = scanData.special;

  // Build summary grid
  const sections = [
    { id:'alive',        n:b.alive?.length||0,        color:'var(--accent)',  label:'Alive 200' },
    { id:'redirect',     n:b.redirect?.length||0,      color:'var(--blue)',    label:'Redirects' },
    { id:'forbidden',    n:b.forbidden?.length||0,     color:'var(--orange)',  label:'403' },
    { id:'server_error', n:b.server_error?.length||0,  color:'var(--red)',     label:'5xx Errors' },
    { id:'not_found',    n:b.not_found?.length||0,     color:'var(--muted)',   label:'404' },
    { id:'unchecked',    n:b.unchecked?.length||0,     color:'#334155',        label:'Unchecked' },
    { id:'js',                 n:sp.js?.length||0,                color:'var(--yellow)',  label:'JS Files' },
    { id:'json',               n:sp.json?.length||0,              color:'var(--yellow)',  label:'JSON' },
    { id:'api_endpoints',      n:sp.api_endpoints?.length||0,     color:'var(--blue)',    label:'API' },
    { id:'with_params',        n:sp.with_params?.length||0,       color:'var(--accent)',  label:'w/ Params' },
    { id:'interesting_params', n:sp.interesting_params?.length||0,color:'#00ffaa',        label:'Juicy Params' },
    { id:'admin_panels',       n:sp.admin_panels?.length||0,      color:'var(--red)',     label:'Admin' },
    { id:'auth_endpoints',     n:sp.auth_endpoints?.length||0,    color:'var(--orange)',  label:'Auth' },
    { id:'file_uploads',       n:sp.file_uploads?.length||0,      color:'var(--orange)',  label:'Uploads' },
    { id:'graphql',            n:sp.graphql?.length||0,           color:'var(--purple)',  label:'GraphQL' },
    { id:'swagger_docs',       n:sp.swagger_docs?.length||0,      color:'var(--blue)',    label:'Swagger' },
    { id:'sensitive_files',    n:sp.sensitive_files?.length||0,   color:'var(--red)',     label:'Sensitive' },
    { id:'debug_endpoints',    n:sp.debug_endpoints?.length||0,   color:'var(--orange)',  label:'Debug' },
    { id:'webhooks',           n:sp.webhooks?.length||0,          color:'var(--purple)',  label:'Webhooks' },
    { id:'backend_files',      n:sp.backend_files?.length||0,     color:'var(--orange)',  label:'Backend' },
  ];

  let html = `<div class="summary-grid">`;
  sections.forEach(s => {
    html += `<div class="sum-card ${activeSection===s.id?'active':''}" onclick="setSection('${s.id}')">
      <div class="num" style="color:${s.color}">${s.n}</div>
      <div class="lbl">${s.label}</div>
    </div>`;
  });
  html += `</div>`;

  // Current section list
  const list = getList(activeSection);
  const filtered = list.filter(r => !searchQ || r.url.toLowerCase().includes(searchQ.toLowerCase()));
  const meta = SECTION_META[activeSection];

  html += `
  <div class="export-row">
    <button class="exp-btn" onclick="exportTxt()">⬇ TXT (current)</button>
    <button class="exp-btn" onclick="exportAllTxt()">⬇ TXT (all)</button>
    <button class="exp-btn" onclick="exportJSON()">⬇ JSON (full)</button>
    <button class="exp-btn" onclick="copySection()">📋 Copy section</button>
  </div>

  <div style="margin-bottom:12px">
    <span style="font-size:13px;font-weight:600;color:${meta?.color||'var(--text)'}">${meta?.label||activeSection}</span>
    <span style="font-size:11px;color:var(--muted);margin-left:8px;font-family:var(--mono)">${list.length} total</span>
  </div>

  <div class="search-bar">
    <input placeholder="Filter URLs..." oninput="doSearch(this.value)" value="${searchQ}" />
    <span class="result-count">${filtered.length} results</span>
  </div>

  <div class="url-list">`;

  if (!filtered.length) {
    html += `<div class="empty"><div class="empty-icon">🔍</div><div class="empty-title">No URLs in this category</div></div>`;
  } else {
    filtered.slice(0, 500).forEach(r => {
      const st = r.status;
      const sc = st === 200 ? 's200' : st === 301||st===302||st===307||st===308 ? 's302' :
                 st === 403 ? 's403' : st === 404 ? 's404' :
                 st >= 500 ? 's500' : 's-null';
      const stLabel = st && st > 0 ? st : '—';

      const tagHtml = (r.tags||[]).slice(0,4).map(t => {
        const cls = ['api','admin','sensitive','auth','js','json','params','interesting-params'].includes(t)
          ? `tag tag-${t}` : 'tag';
        return `<span class="${cls}">${t}</span>`;
      }).join('');

      html += `<div class="url-row-item">
        <span class="status-badge ${sc}">${stLabel}</span>
        ${tagHtml ? `<div class="tag-list">${tagHtml}</div>` : ''}
        <span class="url-text">${esc(r.url)}</span>
        <button class="copy-url" onclick="cpUrl(event,'${esc(r.url)}')">copy</button>
      </div>`;
    });
    if (filtered.length > 500) {
      html += `<div style="text-align:center;padding:14px;font-size:12px;color:var(--muted);font-family:var(--mono)">
        ... and ${filtered.length - 500} more — export TXT to see all
      </div>`;
    }
  }

  html += `</div>`;
  document.getElementById('results').innerHTML = html;
}

function setSection(s) { activeSection = s; searchQ = ''; renderResults(); }
function doSearch(q) { searchQ = q; renderResults(); }

function cpUrl(e, url) {
  navigator.clipboard.writeText(url).then(() => {
    e.target.textContent = '✓'; setTimeout(() => e.target.textContent = 'copy', 1200);
  });
}

function exportTxt() {
  if (!scanData) return;
  const list = getList(activeSection).map(r => r.url).join('\n');
  dl(`${scanData.domain}-${activeSection}.txt`, list, 'text/plain');
}

function exportAllTxt() {
  if (!scanData) return;
  const b = scanData.buckets, sp = scanData.special;
  let txt = `# Wayback Recon — ${scanData.domain}\n# Date: ${new Date().toISOString().slice(0,10)}\n\n`;
  txt += `## ALIVE (200)\n${b.alive?.map(r=>r.url).join('\n')||''}\n\n`;
  txt += `## REDIRECTS\n${b.redirect?.map(r=>r.url).join('\n')||''}\n\n`;
  txt += `## FORBIDDEN (403)\n${b.forbidden?.map(r=>r.url).join('\n')||''}\n\n`;
  txt += `## SERVER ERRORS (5xx)\n${b.server_error?.map(r=>r.url).join('\n')||''}\n\n`;
  txt += `## JS FILES\n${sp.js?.map(r=>r.url).join('\n')||''}\n\n`;
  txt += `## JSON FILES\n${sp.json?.map(r=>r.url).join('\n')||''}\n\n`;
  txt += `## API ENDPOINTS\n${sp.api_endpoints?.map(r=>r.url).join('\n')||''}\n\n`;
  txt += `## WITH PARAMS\n${sp.with_params?.map(r=>r.url).join('\n')||''}\n\n`;
  txt += `## JUICY PARAMS\n${sp.interesting_params?.map(r=>r.url).join('\n')||''}\n\n`;
  txt += `## ADMIN PANELS\n${sp.admin_panels?.map(r=>r.url).join('\n')||''}\n\n`;
  txt += `## SENSITIVE FILES\n${sp.sensitive_files?.map(r=>r.url).join('\n')||''}\n\n`;
  dl(`${scanData.domain}-full-recon.txt`, txt, 'text/plain');
}

function exportJSON() {
  if (!scanData) return;
  dl(`${scanData.domain}-recon.json`, JSON.stringify(scanData, null, 2), 'application/json');
}

function copySection() {
  if (!scanData) return;
  const list = getList(activeSection).map(r => r.url).join('\n');
  navigator.clipboard.writeText(list).then(() => alert(`Copied ${getList(activeSection).length} URLs`));
}

function dl(name, content, type) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([content],{type}));
  a.download = name; a.click();
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('domain').addEventListener('keydown', e => {
    if (e.key === 'Enter') startScan();
  });
});
</script>
</body>
</html>
