<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wayback Recon</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap');
:root{
  --bg:#060910;--card:#0f1923;--border:#1a2535;
  --accent:#00ff88;--blue:#38bdf8;--red:#ff4560;--orange:#ff8c00;
  --yellow:#ffd60a;--purple:#a371f7;--muted:#4a5568;--text:#e2e8f0;
  --mono:'JetBrains Mono',monospace;--ui:'Inter',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--ui);min-height:100vh}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,255,136,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,136,.025) 1px,transparent 1px);background-size:44px 44px;pointer-events:none;z-index:0}

.hero{position:relative;z-index:1;padding:44px 20px 28px;max-width:860px;margin:0 auto;text-align:center}
.eyebrow{display:inline-flex;align-items:center;gap:8px;background:rgba(0,255,136,.07);border:1px solid rgba(0,255,136,.18);border-radius:20px;padding:5px 14px;font-family:var(--mono);font-size:11px;color:var(--accent);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:18px}
.dot{width:6px;height:6px;background:var(--accent);border-radius:50%;animation:blink 1.4s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}
h1{font-size:clamp(24px,5vw,46px);font-weight:700;letter-spacing:-1px;margin-bottom:10px}
h1 em{font-style:normal;background:linear-gradient(135deg,var(--accent),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-sub{font-size:14px;color:var(--muted);margin:0 auto 28px;max-width:520px;line-height:1.7}

.panel{max-width:860px;margin:0 auto 18px;padding:0 18px;position:relative;z-index:1}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:22px}
.field-lbl{font-size:11px;font-family:var(--mono);color:var(--accent);letter-spacing:1.2px;text-transform:uppercase;margin-bottom:7px}
.input-row{display:flex;gap:10px;flex-wrap:wrap}
input[type=text]{flex:1;min-width:180px;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:11px 14px;color:var(--text);font-family:var(--mono);font-size:13px;outline:none;transition:border-color .2s}
input[type=text]:focus{border-color:var(--accent)}
input::placeholder{color:var(--muted)}
select{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:11px 14px;color:var(--text);font-family:var(--mono);font-size:12px;outline:none;cursor:pointer}
.btn-scan{background:linear-gradient(135deg,#00cc6a,#0055dd);border:none;border-radius:8px;padding:11px 26px;color:#fff;font-size:13px;font-weight:700;font-family:var(--ui);cursor:pointer;transition:all .2s;white-space:nowrap}
.btn-scan:hover{filter:brightness(1.1);transform:translateY(-1px)}
.btn-scan:disabled{opacity:.4;cursor:not-allowed;transform:none}

/* steps progress */
.prog-wrap{max-width:860px;margin:0 auto 16px;padding:0 18px;position:relative;z-index:1;display:none}
.prog-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px 20px}
.steps{display:flex;gap:0;margin-bottom:12px}
.step{flex:1;text-align:center;position:relative}
.step::after{content:'';position:absolute;top:12px;right:-50%;width:100%;height:2px;background:var(--border);z-index:0}
.step:last-child::after{display:none}
.step-dot{width:24px;height:24px;border-radius:50%;background:var(--border);border:2px solid var(--border);font-size:10px;font-family:var(--mono);display:flex;align-items:center;justify-content:center;margin:0 auto 6px;position:relative;z-index:1;transition:all .3s}
.step.active .step-dot{background:var(--accent);border-color:var(--accent);color:#000;font-weight:700}
.step.done .step-dot{background:rgba(0,255,136,.2);border-color:var(--accent);color:var(--accent)}
.step-lbl{font-size:10px;color:var(--muted);font-family:var(--mono)}
.step.active .step-lbl{color:var(--accent)}
.step.done .step-lbl{color:var(--accent);opacity:.6}
.track{background:var(--border);border-radius:3px;height:3px;overflow:hidden;margin-top:10px}
.fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--blue));width:0;transition:width .5s;border-radius:3px}
.prog-status{margin-top:8px;font-family:var(--mono);font-size:11px;color:var(--muted)}

/* results */
.results{max-width:860px;margin:0 auto;padding:0 18px 52px;position:relative;z-index:1}
.summary-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:7px;margin-bottom:18px}
.sum-card{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:10px 12px;text-align:center;cursor:pointer;transition:all .15s}
.sum-card:hover{border-color:#2a3f55;transform:translateY(-1px)}
.sum-card.active{border-color:var(--accent);background:rgba(0,255,136,.04)}
.sum-card .num{font-family:var(--mono);font-size:22px;font-weight:700;line-height:1.1}
.sum-card .lbl{font-size:9px;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:.4px}

.secrets-alert{background:rgba(255,69,96,.07);border:1px solid rgba(255,69,96,.25);border-radius:10px;padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:all .15s}
.secrets-alert:hover{background:rgba(255,69,96,.12)}
.secrets-alert .stxt{font-size:13px;font-weight:600;color:var(--red)}
.secrets-alert .ssub{font-size:11px;color:var(--muted);margin-top:2px}

.export-row{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px}
.exp-btn{background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:6px;padding:5px 13px;font-size:11px;cursor:pointer;font-family:var(--ui);transition:all .15s}
.exp-btn:hover{border-color:var(--blue);color:var(--blue)}

.sec-title{font-size:13px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.search-bar{display:flex;gap:8px;margin-bottom:12px;align-items:center}
.search-bar input{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:8px 12px;color:var(--text);font-family:var(--mono);font-size:12px;outline:none}
.search-bar input:focus{border-color:var(--accent)}
.search-bar input::placeholder{color:var(--muted)}
.res-count{font-family:var(--mono);font-size:11px;color:var(--muted);white-space:nowrap}

.url-list{display:flex;flex-direction:column;gap:5px}
.url-item{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:9px 12px;display:flex;align-items:center;gap:8px;transition:border-color .15s}
.url-item:hover{border-color:#253040}
.sbadge{font-size:9px;font-family:var(--mono);font-weight:700;padding:2px 7px;border-radius:4px;flex-shrink:0;min-width:36px;text-align:center}
.s200{background:rgba(0,255,136,.12);color:var(--accent);border:1px solid rgba(0,255,136,.25)}
.s3xx{background:rgba(56,189,248,.12);color:var(--blue);border:1px solid rgba(56,189,248,.25)}
.s403{background:rgba(255,140,0,.12);color:var(--orange);border:1px solid rgba(255,140,0,.25)}
.s404{background:rgba(74,85,104,.1);color:var(--muted);border:1px solid rgba(74,85,104,.2)}
.s5xx{background:rgba(255,69,96,.12);color:var(--red);border:1px solid rgba(255,69,96,.25)}
.snull{background:rgba(74,85,104,.07);color:#334155;border:1px solid rgba(74,85,104,.1)}
.tags{display:flex;gap:3px;flex-shrink:0;max-width:150px;flex-wrap:wrap}
.tag{font-size:9px;font-family:var(--mono);padding:2px 5px;border-radius:3px}
.tjs,.tjson{background:rgba(255,214,10,.1);color:var(--yellow);border:1px solid rgba(255,214,10,.2)}
.tapi{background:rgba(56,189,248,.1);color:var(--blue);border:1px solid rgba(56,189,248,.2)}
.tadmin,.tsensitive{background:rgba(255,69,96,.1);color:var(--red);border:1px solid rgba(255,69,96,.2)}
.tauth{background:rgba(255,140,0,.1);color:var(--orange);border:1px solid rgba(255,140,0,.2)}
.tparams{background:rgba(0,255,136,.1);color:var(--accent);border:1px solid rgba(0,255,136,.2)}
.tdefault{background:rgba(163,113,247,.1);color:var(--purple);border:1px solid rgba(163,113,247,.2)}
.ulink{font-family:var(--mono);font-size:11px;word-break:break-all;flex:1;color:#6b8aaa;text-decoration:none;transition:color .15s}
.ulink:hover{color:var(--accent)}
.cbtn{background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:3px;padding:2px 7px;font-size:10px;font-family:var(--mono);cursor:pointer;flex-shrink:0;transition:all .15s}
.cbtn:hover{border-color:var(--accent);color:var(--accent)}

/* secrets */
.secret-card{background:var(--card);border:1px solid var(--border);border-radius:9px;margin-bottom:9px;overflow:hidden}
.secret-card.sc-critical{border-left:3px solid var(--red)}
.secret-card.sc-high{border-left:3px solid var(--orange)}
.secret-card.sc-medium{border-left:3px solid var(--yellow)}
.secret-card.sc-low{border-left:3px solid var(--blue)}
.secret-card.sc-info{border-left:3px solid var(--muted)}
.sch{padding:11px 14px;display:flex;align-items:center;gap:9px;cursor:pointer}
.sch:hover{background:rgba(255,255,255,.02)}
.spill{font-size:9px;font-family:var(--mono);font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:2px 7px;border-radius:4px;flex-shrink:0}
.pc{background:rgba(255,69,96,.15);color:var(--red);border:1px solid rgba(255,69,96,.3)}
.ph{background:rgba(255,140,0,.15);color:var(--orange);border:1px solid rgba(255,140,0,.3)}
.pm{background:rgba(255,214,10,.1);color:var(--yellow);border:1px solid rgba(255,214,10,.25)}
.pl{background:rgba(56,189,248,.1);color:var(--blue);border:1px solid rgba(56,189,248,.25)}
.pi{background:rgba(74,85,104,.15);color:var(--muted);border:1px solid rgba(74,85,104,.3)}
.stype{font-size:13px;font-weight:600;flex:1}
.ssrc{font-family:var(--mono);font-size:10px;color:var(--muted);max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.stoggle{color:var(--muted);font-size:11px;transition:transform .2s}
.secret-card.open .stoggle{transform:rotate(180deg)}
.scb{display:none;padding:0 14px 14px;border-top:1px solid var(--border)}
.secret-card.open .scb{display:block}
.mval{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:10px 12px;margin-top:10px;font-family:var(--mono);font-size:12px;color:var(--accent);word-break:break-all}
.mgrid{display:grid;grid-template-columns:80px 1fr;gap:4px 10px;margin-top:10px;font-size:11px}
.mk{color:var(--muted);font-family:var(--mono)}
.mv{font-family:var(--mono);word-break:break-all}
.alink{color:var(--blue);text-decoration:none;font-family:var(--mono);font-size:11px}
.alink:hover{color:var(--accent);text-decoration:underline}

.more-btn{width:100%;background:transparent;border:1px dashed var(--border);color:var(--muted);border-radius:7px;padding:10px;font-size:12px;cursor:pointer;font-family:var(--ui);transition:all .15s;margin-top:8px}
.more-btn:hover{border-color:var(--accent);color:var(--accent)}
.empty{text-align:center;padding:48px 20px;color:var(--muted)}
.empty-icon{font-size:40px;opacity:.35;margin-bottom:12px}
.empty-title{font-size:14px;font-weight:600;color:#64748b}

@media(max-width:580px){.input-row{flex-direction:column}select,.btn-scan{width:100%}.summary-grid{grid-template-columns:repeat(3,1fr)}}
</style>
</head>
<body>

<div class="hero">
  <div class="eyebrow"><span class="dot"></span> Web Archive Recon</div>
  <h1>Wayback <em>Recon</em></h1>
  <p class="hero-sub">بيجيب كل الروابط من Wayback Machine، يفحص الـ status codes، يسكان الـ JS files عن secrets، ويصنف كل حاجة.</p>
</div>

<div class="panel">
  <div class="card">
    <div class="field-lbl">// Target Domain</div>
    <div class="input-row">
      <input type="text" id="domain" placeholder="target.com" />
      <select id="limit">
        <option value="500">500 URLs</option>
        <option value="1000" selected>1000 URLs</option>
        <option value="2000">2000 URLs</option>
      </select>
      <button class="btn-scan" id="scan-btn" onclick="startScan()">⚡ Scan</button>
    </div>
  </div>
</div>

<div class="prog-wrap" id="prog-wrap">
  <div class="prog-card">
    <div class="steps">
      <div class="step" id="step-0"><div class="step-dot">1</div><div class="step-lbl">Fetch URLs</div></div>
      <div class="step" id="step-1"><div class="step-dot">2</div><div class="step-lbl">Check Status</div></div>
      <div class="step" id="step-2"><div class="step-dot">3</div><div class="step-lbl">Scan Secrets</div></div>
      <div class="step" id="step-3"><div class="step-dot">✓</div><div class="step-lbl">Done</div></div>
    </div>
    <div class="track"><div class="fill" id="fill"></div></div>
    <div class="prog-status" id="prog-status">Starting...</div>
  </div>
</div>

<div class="results" id="results"></div>

<script>
var scanData = null;
var activeSection = 'alive';
var searchQ = '';
var showLimit = 200;

var SECTIONS = [
  {id:'alive',        label:'✅ Alive 200',    color:'var(--accent)', type:'bucket'},
  {id:'redirect',     label:'↪ Redirects',     color:'var(--blue)',   type:'bucket'},
  {id:'forbidden',    label:'🔒 403',          color:'var(--orange)', type:'bucket'},
  {id:'server_error', label:'💥 5xx',          color:'var(--red)',    type:'bucket'},
  {id:'not_found',    label:'404',             color:'var(--muted)',  type:'bucket'},
  {id:'unchecked',    label:'⬜ Unchecked',    color:'#334155',       type:'bucket'},
  {id:'js',                 label:'📜 JS Files',      color:'var(--yellow)', type:'special'},
  {id:'json',               label:'{ } JSON',         color:'var(--yellow)', type:'special'},
  {id:'api_endpoints',      label:'🔌 API',           color:'var(--blue)',   type:'special'},
  {id:'with_params',        label:'? Params',         color:'var(--accent)', type:'special'},
  {id:'interesting_params', label:'🎯 Juicy Params',  color:'#00ffaa',       type:'special'},
  {id:'admin_panels',       label:'🚨 Admin',         color:'var(--red)',    type:'special'},
  {id:'auth_endpoints',     label:'🔑 Auth',          color:'var(--orange)', type:'special'},
  {id:'sensitive_files',    label:'⚠️ Sensitive',     color:'var(--red)',    type:'special'},
  {id:'swagger_docs',       label:'📖 Swagger',       color:'var(--blue)',   type:'special'},
  {id:'graphql',            label:'⬡ GraphQL',        color:'var(--purple)', type:'special'},
  {id:'debug_endpoints',    label:'🐛 Debug',         color:'var(--orange)', type:'special'},
  {id:'webhooks',           label:'🪝 Webhooks',      color:'var(--purple)', type:'special'},
  {id:'backend_files',      label:'⚙️ Backend',       color:'var(--orange)', type:'special'},
  {id:'secrets',            label:'🔐 Secrets',       color:'var(--red)',    type:'secrets'},
  {id:'pii',                label:'👤 PII Data',       color:'#f472b6',       type:'pii'},
];

function setStep(n) {
  for (var i = 0; i < 4; i++) {
    var el = document.getElementById('step-'+i);
    el.className = 'step' + (i < n ? ' done' : i === n ? ' active' : '');
  }
  document.getElementById('fill').style.width = (n/3*100) + '%';
}

function setStatus(msg) { document.getElementById('prog-status').textContent = msg; }

async function apiCall(payload) {
  var r = await fetch('/api/wayback', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload),
  });
  if (!r.ok) { var e = await r.json(); throw new Error(e.error || 'Error ' + r.status); }
  return r.json();
}

async function startScan() {
  var domain = document.getElementById('domain').value.trim().replace(/^https?:\/\//,'').replace(/\/.*/,'').replace(/^www\./,'');
  if (!domain) { alert('أدخلي الـ domain'); return; }

  scanData = null; activeSection = 'alive'; searchQ = ''; showLimit = 200;
  document.getElementById('results').innerHTML = '';
  document.getElementById('prog-wrap').style.display = 'block';
  document.getElementById('scan-btn').disabled = true;

  var limit = parseInt(document.getElementById('limit').value);

  try {
    // STEP 1: Fetch URLs
    setStep(0); setStatus('Fetching URLs from Wayback Machine...');
    var fetchRes = await apiCall({ action:'fetch', domain:domain, limit:limit });
    var allUrls = fetchRes.urls || [];
    setStatus('Got ' + allUrls.length + ' URLs — checking status...');

    // STEP 2: Status check in batches of 50
    setStep(1);
    var statusMap = {};
    var checkable = allUrls.slice(0, 100);
    var batches = [];
    for (var i = 0; i < checkable.length; i += 50) {
      batches.push(checkable.slice(i, i+50).map(function(r){return r.url;}));
    }
    for (var b = 0; b < batches.length; b++) {
      setStatus('Checking status: batch ' + (b+1) + '/' + batches.length + '...');
      try {
        var cr = await apiCall({ action:'check', domain:domain, urls:batches[b] });
        (cr.results||[]).forEach(function(r){ statusMap[r.url] = r.status; });
      } catch(e) {}
    }
    allUrls.forEach(function(r){ if(statusMap[r.url]) r.status = statusMap[r.url]; });

    // STEP 3: Secret scan
    setStep(2); setStatus('Scanning JS files for secrets...');
    var jsUrls = allUrls.filter(function(r){return r.tags.includes('js')||r.tags.includes('json')||r.tags.includes('env');}).slice(0,15).map(function(r){return r.url;});
    var secrets = [];
    try {
      var sr = await apiCall({ action:'scan', domain:domain, urls:jsUrls });
      secrets = sr.secrets || [];
    } catch(e) {}

    // Build result
    setStep(3); setStatus('✅ Done — ' + allUrls.length + ' URLs · ' + secrets.length + ' secrets');

    function filterBy(fn){ return allUrls.filter(fn); }
    var inc = function(r,t){ return r.tags.includes(t); };

    scanData = {
      domain: domain,
      total_found: allUrls.length,
      secrets_found: secrets.length,
      buckets: {
        alive:        filterBy(function(r){return r.status===200;}),
        redirect:     filterBy(function(r){return [301,302,303,307,308].includes(r.status);}),
        forbidden:    filterBy(function(r){return r.status===403;}),
        server_error: filterBy(function(r){return r.status>=500;}),
        not_found:    filterBy(function(r){return r.status===404;}),
        unchecked:    filterBy(function(r){return !r.status||r.status<=0;}),
      },
      special: {
        js:                 filterBy(function(r){return inc(r,'js');}),
        json:               filterBy(function(r){return inc(r,'json');}),
        api_endpoints:      filterBy(function(r){return inc(r,'api');}),
        with_params:        filterBy(function(r){return inc(r,'params');}),
        interesting_params: filterBy(function(r){return inc(r,'interesting-params');}),
        admin_panels:       filterBy(function(r){return inc(r,'admin');}),
        auth_endpoints:     filterBy(function(r){return inc(r,'auth');}),
        sensitive_files:    filterBy(function(r){return r.tags.some(function(t){return['env','git','database','log','backup','config','archive'].includes(t);});}),
        swagger_docs:       filterBy(function(r){return inc(r,'swagger');}),
        graphql:            filterBy(function(r){return inc(r,'graphql');}),
        debug_endpoints:    filterBy(function(r){return inc(r,'debug');}),
        webhooks:           filterBy(function(r){return inc(r,'webhook');}),
        backend_files:      filterBy(function(r){return inc(r,'backend');}),
      },
      secrets: secrets,
    };

    renderResults();
  } catch(e) {
    setStatus('⚠ Error: ' + e.message);
    document.getElementById('fill').style.width='0';
  }
  document.getElementById('scan-btn').disabled = false;
}

var PII_TYPES = ['Email Address','Phone Number (International)','Phone Number (Egypt/Arab)','Credit Card Number','National ID (Egypt)','Passport Number','Physical Address','Name Field','Username Hardcoded','IBAN','IPv4 Address','MAC Address'];

function getList(id) {
  if (!scanData) return [];
  if (id === 'secrets') return (scanData.secrets||[]).filter(function(s){ return !PII_TYPES.includes(s.type); });
  if (id === 'pii')     return (scanData.secrets||[]).filter(function(s){ return PII_TYPES.includes(s.type); });
  var s = SECTIONS.find(function(x){return x.id===id;});
  if (!s) return [];
  if (s.type==='bucket') return scanData.buckets[id]||[];
  return scanData.special[id]||[];
}

function sBadge(st) {
  if (st===200) return 's200';
  if ([301,302,303,307,308].includes(st)) return 's3xx';
  if (st===403) return 's403';
  if (st===404) return 's404';
  if (st>=500)  return 's5xx';
  return 'snull';
}

function tagCls(t) {
  if (t==='js'||t==='json') return 'tag tjs';
  if (t==='api') return 'tag tapi';
  if (t==='admin'||t==='sensitive') return 'tag tadmin';
  if (t==='auth') return 'tag tauth';
  if (t==='params'||t==='interesting-params') return 'tag tparams';
  return 'tag tdefault';
}

function pillCls(sev) {
  return 'spill '+ ({critical:'pc',high:'ph',medium:'pm',low:'pl',info:'pi'}[sev]||'pi');
}

function renderResults() {
  if (!scanData) return;
  var sec = scanData.secrets||[];

  var html = '<div class="summary-grid">';
  SECTIONS.forEach(function(s) {
    var n = getList(s.id).length;
    html += '<div class="sum-card'+(activeSection===s.id?' active':'')+'" onclick="setSection(\''+s.id+'\')">'
      +'<div class="num" style="color:'+s.color+'">'+n+'</div>'
      +'<div class="lbl">'+s.label+'</div></div>';
  });
  html += '</div>';

  if (sec.length && activeSection!=='secrets') {
    var realSecrets = sec.filter(function(s){return !PII_TYPES.includes(s.type);});
    var pii = sec.filter(function(s){return PII_TYPES.includes(s.type);});
    if (realSecrets.length) {
      html += '<div class="secrets-alert" onclick="setSection(\'secrets\')">'
        +'<div style="font-size:20px">🔐</div>'
        +'<div><div class="stxt">⚠ '+realSecrets.length+' Secret'+(realSecrets.length>1?'s':'')+' Found!</div>'
        +'<div class="ssub">API keys, tokens, credentials found in JS/source files</div></div></div>';
    }
    if (pii.length && activeSection!=='pii') {
      html += '<div class="secrets-alert" style="border-color:rgba(244,114,182,.3);background:rgba(244,114,182,.07)" onclick="setSection(\'pii\')">'
        +'<div style="font-size:20px">👤</div>'
        +'<div><div class="stxt" style="color:#f472b6">⚠ '+pii.length+' PII Record'+(pii.length>1?'s':'')+' Found!</div>'
        +'<div class="ssub">Emails, phone numbers, names, addresses, IBANs</div></div></div>';
    }
  }

  html += '<div class="export-row">'
    +'<button class="exp-btn" onclick="exportTxt()">⬇ TXT (section)</button>'
    +'<button class="exp-btn" onclick="exportAll()">⬇ TXT (all)</button>'
    +'<button class="exp-btn" onclick="exportJSON()">⬇ JSON</button>'
    +'<button class="exp-btn" onclick="copySection()">📋 Copy</button>'
    +'</div>';

  var cur = SECTIONS.find(function(s){return s.id===activeSection;});
  var list = getList(activeSection);
  var filtered = (activeSection==='secrets'||activeSection==='pii')
    ? list.filter(function(r){return !searchQ||r.type.toLowerCase().includes(searchQ.toLowerCase())||r.match.toLowerCase().includes(searchQ.toLowerCase())||r.source.toLowerCase().includes(searchQ.toLowerCase());})
    : list.filter(function(r){return !searchQ||r.url.toLowerCase().includes(searchQ.toLowerCase());});

  html += '<div class="sec-title" style="color:'+(cur?cur.color:'var(--text)')+'">'+( cur?cur.label:activeSection)
    +'<span style="font-size:11px;color:var(--muted);font-weight:400;font-family:var(--mono)">'+list.length+' total</span></div>';

  html += '<div class="search-bar"><input placeholder="Filter..." oninput="doSearch(this.value)" value="'+esc(searchQ)+'" />'
    +'<span class="res-count">'+filtered.length+' results</span></div>';

  if (activeSection==='secrets' || activeSection==='pii') {
    if (!filtered.length) {
      html += '<div class="empty"><div class="empty-icon">✅</div><div class="empty-title">No secrets found</div></div>';
    } else {
      filtered.slice(0,showLimit).forEach(function(f,i) {
        var srcShort = '';
        try { srcShort = new URL(f.source).pathname.slice(-45)||f.source; } catch(e){srcShort=f.source;}
        html += '<div class="secret-card sc-'+f.severity+'" id="sc-'+i+'">'
          +'<div class="sch" onclick="toggleSec('+i+')">'
          +'<span class="'+pillCls(f.severity)+'">'+f.severity+'</span>'
          +'<span class="stype">'+esc(f.type)+'</span>'
          +'<a class="alink ssrc" href="'+esc(f.source)+'" target="_blank" rel="noopener" onclick="event.stopPropagation()" title="'+esc(f.source)+'">'+esc(srcShort)+'</a>'
          +'<span class="stoggle">▼</span></div>'
          +'<div class="scb">'
          +'<div class="mval">'+esc(f.match)+'</div>'
          +'<div class="mgrid">'
          +'<span class="mk">Type</span><span class="mv">'+esc(f.type)+'</span>'
          +'<span class="mk">Severity</span><span class="mv" style="color:var(--red)">'+f.severity.toUpperCase()+'</span>'
          +'<span class="mk">Source</span><span class="mv"><a class="alink" href="'+esc(f.source)+'" target="_blank" rel="noopener">'+esc(f.source)+'</a></span>'
          +'</div></div></div>';
      });
    }
  } else {
    if (!filtered.length) {
      html += '<div class="empty"><div class="empty-icon">🔍</div><div class="empty-title">No URLs in this category</div></div>';
    } else {
      html += '<div class="url-list">';
      filtered.slice(0,showLimit).forEach(function(r) {
        var sc = sBadge(r.status);
        var stL = r.status&&r.status>0?r.status:'—';
        var tags = (r.tags||[]).slice(0,3).map(function(t){return '<span class="'+tagCls(t)+'">'+t+'</span>';}).join('');
        html += '<div class="url-item">'
          +'<span class="sbadge '+sc+'">'+stL+'</span>'
          +'<div class="tags">'+tags+'</div>'
          +'<a class="ulink" href="'+esc(r.url)+'" target="_blank" rel="noopener" title="'+esc(r.url)+'">'+esc(r.url)+'</a>'
          +'<button class="cbtn" onclick="cpUrl(event,\''+esc(r.url)+'\')">copy</button>'
          +'</div>';
      });
      html += '</div>';
    }
  }

  if (filtered.length > showLimit) {
    html += '<button class="more-btn" onclick="loadMore()">Load more ('+(filtered.length-showLimit)+' remaining)</button>';
  }

  document.getElementById('results').innerHTML = html;
}

function toggleSec(i){ document.getElementById('sc-'+i).classList.toggle('open'); }
function setSection(s){ activeSection=s; searchQ=''; showLimit=200; renderResults(); }
function doSearch(q){ searchQ=q; showLimit=200; renderResults(); }
function loadMore(){ showLimit+=200; renderResults(); }

function cpUrl(e,url){
  e.preventDefault(); e.stopPropagation();
  navigator.clipboard.writeText(url).then(function(){
    e.target.textContent='✓'; setTimeout(function(){e.target.textContent='copy';},1200);
  });
}

function exportTxt(){
  if(!scanData) return;
  var isSec = activeSection==='secrets'||activeSection==='pii';
  var list = isSec
    ? getList(activeSection).map(function(s){return '['+s.severity.toUpperCase()+'] '+s.type+'\nMatch: '+s.match+'\nSource: '+s.source+'\n';}).join('\n')
    : getList(activeSection).map(function(r){return r.url;}).join('\n');
  dl(scanData.domain+'-'+activeSection+'.txt', list, 'text/plain');
}

function exportAll(){
  if(!scanData) return;
  var b=scanData.buckets, sp=scanData.special;
  var txt='# Wayback Recon — '+scanData.domain+'\n# Date: '+new Date().toISOString().slice(0,10)+'\n# Total: '+scanData.total_found+' URLs\n\n';
  [['ALIVE 200',b.alive],['REDIRECTS',b.redirect],['FORBIDDEN 403',b.forbidden],['SERVER ERRORS 5xx',b.server_error],
   ['JS FILES',sp.js],['JSON FILES',sp.json],['API ENDPOINTS',sp.api_endpoints],['WITH PARAMS',sp.with_params],
   ['JUICY PARAMS',sp.interesting_params],['ADMIN PANELS',sp.admin_panels],['SENSITIVE FILES',sp.sensitive_files],
   ['AUTH ENDPOINTS',sp.auth_endpoints],['SWAGGER',sp.swagger_docs],['GRAPHQL',sp.graphql]
  ].forEach(function(x){
    if(x[1]&&x[1].length) txt+='## '+x[0]+' ('+x[1].length+')\n'+x[1].map(function(r){return r.url;}).join('\n')+'\n\n';
  });
  if(scanData.secrets&&scanData.secrets.length){
    txt+='## SECRETS ('+scanData.secrets.length+')\n';
    scanData.secrets.forEach(function(s){txt+='['+s.severity.toUpperCase()+'] '+s.type+'\nMatch: '+s.match+'\nSource: '+s.source+'\n\n';});
  }
  dl(scanData.domain+'-full-recon.txt', txt, 'text/plain');
}

function exportJSON(){
  if(!scanData) return;
  dl(scanData.domain+'-recon.json', JSON.stringify(scanData,null,2), 'application/json');
}

function copySection(){
  if(!scanData) return;
  var isSec = activeSection==='secrets'||activeSection==='pii';
  var list = isSec
    ? getList(activeSection).map(function(s){return '['+s.severity+'] '+s.type+': '+s.match+' ('+s.source+')';}).join('\n')
    : getList(activeSection).map(function(r){return r.url;}).join('\n');
  navigator.clipboard.writeText(list).then(function(){alert('Copied '+getList(activeSection).length+' items');});
}

function dl(name,content,type){
  var a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([content],{type:type}));
  a.download=name; a.click();
}

function esc(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

document.addEventListener('DOMContentLoaded',function(){
  document.getElementById('domain').addEventListener('keydown',function(e){if(e.key==='Enter')startScan();});
});
</script>
</body>
</html>
